# spec-spine governing its own repository (dogfood).
#
# This repo is a single Cargo workspace with specs/ at the root and no npm
# packages, so most of this matches the built-in defaults — it is written out
# explicitly to exercise the config parser and document the dogfood setup.
# Every key here is optional; an absent file would behave identically.

[manifest]
# Our own crates carry `[package.metadata.spec-spine].spec = "NNN-slug"`.
metadata_namespace = "spec-spine"

[domains]
allowed = []        # disabled: specs in this repo do not declare a `domain`

[kind]
allowed = []        # disabled: `kind` is free-text here (symmetric with [domains])

[layout]
specs_dir     = "specs"
derived_dir   = ".derived"
standards_dir = "standards/spec"
schemas_dir   = "standards/schemas"
cargo_workspace = "Cargo.toml"
# No npm in this repo; the default still probes these at the root and finds none.
npm_workspaces = ["package.json", "pnpm-workspace.yaml"]
standalone_rust_workspaces = []
# The npm binary-distribution shim (spec 007) is a tracked npm package outside any
# npm workspace (this repo has none), so it is declared as a standalone package.
standalone_npm_packages    = ["npm"]

[index]
extra_hashed_inputs = ["standards/**", ".github/workflows/**"]
resolver_exclusions = ["target", "node_modules", ".derived", "dist", "build", ".next"]

[branding]
compiler_id = "spec-spine"
indexer_id  = "spec-spine"

[coupling]
# Additions to the built-in generic bypass floor (see couple.rs::DEFAULT_BYPASS_PREFIXES).
# This list is ADDITIVE and cannot remove a floor entry. The floor already covers
# the root README.md, docs/, .github/, lockfiles, .derived/, etc.; we extend it to
# per-crate READMEs (e.g. crates/*/README.md) — prose documentation lives inside
# the crate dir, which manifest-metadata maps to the crate's spec, so without this
# a README tweak would read as code drift. `**/README.md` = tail-suffix match.
bypass_prefixes = ["**/README.md"]
waiver_keyword = "Spec-Drift-Waiver:"

[provenance.uri_schemes]
knowledge        = "knowledge://"
code-fingerprint = "fingerprint://"

[frontmatter]
extra_known_keys = []
