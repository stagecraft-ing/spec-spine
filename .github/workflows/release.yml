name: release

# Tag-gated prebuilt-binary release. Pushing a `v*` tag builds a per-triple
# archive (with a .sha256 sidecar) for each of the five supported targets,
# attaches them to the GitHub Release, and publishes the crates to crates.io.
# install.sh (curl | sh) consumes the archives.
#
# Four triples build natively on a matching-arch GitHub runner; x86_64-apple-darwin
# cross-compiles on the Apple Silicon runner, because the Intel macos-13 runner is
# deprecated and queues badly. The crate source is identical, so the binary matches
# what the determinism workflow proves byte-identical.
#
# publish-crates, publish-npm, and publish-pypi are idempotent: each skips any
# version already live (crates.io / npm / PyPI), so re-running a tag is safe.
# publish-npm and publish-pypi assemble their packages/wheels from the SAME build
# archives (no second Rust build); publish-npm is gated on NPM_TOKEN and
# publish-pypi on vars.PYPI_TRUSTED_PUBLISHING: absent the one-time setup each
# is a clean no-op. CycloneDX SBOM is deferred (Q7): low v1 value.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build · ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu }
          # x86_64-apple-darwin cross-compiles on the Apple Silicon runner (Xcode
          # ships the x86_64 SDK); avoids the deprecated, slow-to-queue macos-13.
          - { os: macos-latest,     triple: x86_64-apple-darwin }
          - { os: macos-latest,     triple: aarch64-apple-darwin }
          - { os: windows-latest,   triple: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Add target (no-op if native)
        run: rustup target add ${{ matrix.triple }}
      - name: Build release binary
        run: cargo build --release --locked --bin spec-spine --target ${{ matrix.triple }}

      - name: Stage archive contents
        shell: bash
        run: |
          set -euo pipefail
          EXT=""; [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          mkdir -p staging
          cp "target/${{ matrix.triple }}/release/spec-spine${EXT}" staging/
          cp LICENSE README.md staging/
          echo "ARCHIVE_BASE=spec-spine-${GITHUB_REF_NAME}-${{ matrix.triple }}" >> "$GITHUB_ENV"

      - name: Package (tar.gz + sha256) for Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -C staging -czf "${ARCHIVE_BASE}.tar.gz" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          else
            shasum -a 256 "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          fi
          cat "${ARCHIVE_BASE}.tar.gz.sha256"

      - name: Package (zip + sha256) for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = $env:ARCHIVE_BASE
          Compress-Archive -Path staging/* -DestinationPath "$base.zip" -Force
          $hash = (Get-FileHash "$base.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $base.zip" | Out-File -Encoding ascii -NoNewline "$base.zip.sha256"
          Get-Content "$base.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.triple }}
          path: |
            spec-spine-*.tar.gz
            spec-spine-*.tar.gz.sha256
            spec-spine-*.zip
            spec-spine-*.zip.sha256
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true
      - name: List release assets
        run: ls -la dist
      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish types, core, cli (tolerate versions already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # No -e: we inspect cargo's exit so an already-published version is a
          # skip, not a failure (re-running a tag is then idempotent). cargo
          # publish waits for the new version to be queryable before returning,
          # so the next dependent crate's verify build finds it. No crates.io API
          # call here: that endpoint needs a User-Agent and is easy to get wrong.
          set -uo pipefail
          for crate in spec-spine-types spec-spine-core spec-spine-cli; do
            echo "::group::publish $crate"
            if out="$(cargo publish -p "$crate" --locked 2>&1)"; then
              echo "$out"; echo ">> published $crate"
            else
              echo "$out"
              if echo "$out" | grep -qiE "already (uploaded|exists)"; then
                echo ">> $crate version already on crates.io, skipping"
              else
                echo ">> publish failed for $crate"; exit 1
              fi
            fi
            echo "::endgroup::"
          done

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Gate on NPM_TOKEN: absent the secret, the whole job is a clean no-op (a
      # skip, never a red X), the same posture as the crates.io token. The first
      # publish, the NPM_TOKEN, and the one-time `@spec-spine` org creation are a
      # human's job (see docs/releasing.md).
      - name: Check for NPM_TOKEN
        id: gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=npm publish skipped::NPM_TOKEN secret not set; skipping npm publish"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.present == 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # The npm platform packages bundle the prebuilt binaries directly, so they
      # are assembled from the build job's archives (no second Rust build).
      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.present == 'true'
        with:
          path: dist/archives
          pattern: archive-*
          merge-multiple: true

      - name: Assemble platform packages from the release archives
        if: steps.gate.outputs.present == 'true'
        working-directory: npm
        run: |
          set -euo pipefail
          cp ../LICENSE LICENSE                         # ship the license in the main tarball
          VERSION="${GITHUB_REF_NAME#v}"                # tag v0.1.0 -> 0.1.0
          # --write-main locks the main package version + optionalDependencies to
          # the tag; the generator fails loudly if the tag and committed version
          # disagree on a non-write run, so the lock can never drift silently.
          node scripts/generate-platform-packages.js \
            --version "$VERSION" --archives ../dist/archives --out dist/packages --write-main
          ls -la dist/packages/@spec-spine

      - name: Publish (idempotent; skip versions already on npm)
        if: steps.gate.outputs.present == 'true'
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # No -e: we inspect each publish so an already-published version is a
          # skip, not a failure (re-running a tag is then idempotent). `npm view`
          # is the precheck: it 404s (non-zero) for an unpublished version.
          set -uo pipefail
          publish_if_absent() {
            local dir="$1" name version
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"
            echo "::group::publish ${name}@${version}"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo ">> ${name}@${version} already on npm, skipping"
            else
              # --access public: scoped packages default to restricted.
              npm publish "${dir}" --access public
              echo ">> published ${name}@${version}"
            fi
            echo "::endgroup::"
          }
          # Platform packages first, then the main package, so there is never a
          # window where `spec-spine` is live without its binaries.
          for d in dist/packages/@spec-spine/*; do
            publish_if_absent "$d"
          done
          publish_if_absent "."

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC Trusted Publishing needs an id-token; nothing here writes repo contents.
    permissions:
      id-token: write
    # A dedicated environment is the recommended scope for the Trusted Publisher
    # (configure the same name on PyPI). Harmless if the environment is absent.
    environment:
      name: pypi
      url: https://pypi.org/p/spec-spine
    steps:
      - uses: actions/checkout@v4

      # Gate on a repository variable, not a secret: Trusted Publishing has no
      # token to detect. Absent/false => clean skip (a notice, never a red X),
      # the same posture as publish-npm's NPM_TOKEN gate. A human flips this on
      # after the one-time PyPI project + Trusted Publisher setup (docs/releasing.md).
      - name: Check Trusted Publishing is enabled
        id: gate
        env:
          ENABLED: ${{ vars.PYPI_TRUSTED_PUBLISHING }}
        run: |
          if [ "${ENABLED:-false}" = "true" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=PyPI publish skipped::vars.PYPI_TRUSTED_PUBLISHING is not 'true'; skipping PyPI publish"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.present == 'true'
        with:
          python-version: "3.12"

      - name: Install the build frontend
        if: steps.gate.outputs.present == 'true'
        run: python -m pip install --upgrade build

      # The wheels bundle the prebuilt binaries directly, so they are assembled
      # from the build job's archives (no second Rust build) -- exactly the
      # publish-npm pattern.
      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.present == 'true'
        with:
          path: dist/archives
          pattern: archive-*
          merge-multiple: true

      - name: Assemble wheels + sdist from the release archives
        if: steps.gate.outputs.present == 'true'
        working-directory: py
        run: |
          set -euo pipefail
          cp ../LICENSE LICENSE                         # ship the license in the sdist + wheels
          VERSION="${GITHUB_REF_NAME#v}"                # tag v0.1.0 -> 0.1.0
          # generate_wheels.py verifies the tag matches the committed project
          # version and fails loudly on a mismatch, so the lock cannot drift
          # silently (parity with the npm generator's --write-main check).
          python scripts/generate_wheels.py \
            --version "$VERSION" --archives ../dist/archives --out dist/pypi --build-sdist
          ls -la dist/pypi

      # Trusted Publishing + PEP 740 attestations. `skip-existing: true` makes a
      # re-run of the same tag idempotent (already-uploaded artifacts are a skip,
      # not a failure) -- the property publish-npm gets from its `npm view`
      # precheck. The action mints the OIDC token and signs each artifact; no
      # token is stored in the repo.
      - name: Publish to PyPI (idempotent; signed)
        if: steps.gate.outputs.present == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: py/dist/pypi
          skip-existing: true
          attestations: true

# -----------------------------------------------------------------------------
# publish-pypi token fallback (only if OIDC Trusted Publishing is not available)
#
# Replace the job's `permissions`/`environment` blocks and the gate + publish
# steps with a PYPI_API_TOKEN secret gate that mirrors publish-npm's NPM_TOKEN
# gate one-for-one (absent secret => clean no-op), and publish with twine:
