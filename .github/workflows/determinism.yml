name: determinism

# Cross-triple determinism GOLDEN. spec-spine's central claim is that every
# artifact-producing step is a pure function of (config, file contents): so the
# emitted registry.json and index.json (including tree-sitter symbol line-spans)
# are byte-identical on every platform. This workflow PROVES that empirically
# instead of merely asserting it from the exact-pinned grammars: each leg
# compiles + indexes this repo's own corpus and publishes the digests; the gather
# job fails if any digest differs.
#
# Coverage spans both CPU arches and three OSes: x86_64 (Linux + Windows) and
# aarch64 (Linux + macOS). x86_64-apple-darwin is intentionally omitted: its two
# dimensions are each already proven, and the deprecated Intel macos-13 runner
# queues badly. Its binary is still built and shipped by release.yml
# (cross-compiled on Apple Silicon).
#
# build-meta.json is excluded: it carries a wall-clock `builtAt`, the sole
# non-deterministic artifact (see docs/design/00-architecture.md §10.1).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  emit:
    name: emit · ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu }
          - { os: macos-latest,     triple: aarch64-apple-darwin }
          - { os: windows-latest,   triple: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Build CLI (locked)
        run: cargo build --bin spec-spine --locked
      - name: Compile + index this repo's own corpus
        shell: bash
        run: |
          set -euo pipefail
          BIN=./target/debug/spec-spine
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe" || true
          "$BIN" compile
          "$BIN" index
      - name: Digest the deterministic artifacts
        shell: bash
        run: |
          set -euo pipefail
          # Portable sha256 across Linux (sha256sum) / macOS (shasum) / Windows git-bash.
          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" | awk '{print $1}'
            elif command -v shasum    >/dev/null 2>&1; then shasum -a 256 "$1" | awk '{print $1}'
            else openssl dgst -sha256 "$1" | awk '{print $NF}'; fi
          }
          mkdir -p digests
          {
            echo "${{ matrix.triple }} registry $(sha256 .derived/spec-registry/registry.json)"
            echo "${{ matrix.triple }} index    $(sha256 .derived/codebase-index/index.json)"
          } | tee "digests/${{ matrix.triple }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.triple }}
          path: digests/${{ matrix.triple }}.txt
          if-no-files-found: error

  gather:
    name: assert byte-identical across all triples
    needs: emit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true
      - name: Compare digests
        run: |
          set -euo pipefail
          echo "=== per-triple digests ==="
          cat digests/*.txt | sort
          fail=0
          for kind in registry index; do
            n=$(awk -v k="$kind" '$2==k {print $3}' digests/*.txt | sort -u | wc -l | tr -d ' ')
            count=$(awk -v k="$kind" '$2==k {print $3}' digests/*.txt | wc -l | tr -d ' ')
            if [ "$count" -lt 4 ]; then
              echo "FAIL: $kind reported by only $count/4 triples (a leg failed to emit)"; fail=1
            elif [ "$n" -ne 1 ]; then
              echo "FAIL: $kind.json differs across triples ($n distinct digests)"; fail=1
            else
              echo "OK:   $kind.json is byte-identical across all $count triples"
            fi
          done
          exit $fail
