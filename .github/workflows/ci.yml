name: CI

# Build + test + lint, then self-governance: run spec-spine's OWN governance gates
# against its OWN corpus. A spec-spine that is not itself spec-governed is hypocritical.
#
# Cross-triple tree-sitter symbol-span determinism is a Phase-5 release-matrix
# concern (the resolver is pinned exact; see docs/design/00-architecture.md §10.1),
# not gated here.

on:
  push:
    branches: [main]
  pull_request:
  # Spec 020: GitHub merge queue. Each queued PR is tested against the
  # speculative merged tree, so a green PR cannot be silently invalidated by
  # the one ahead of it (e.g. a duplicate spec id introduced on two branches).
  # The coupling gate stays pull_request-only (it reads the PR-body waiver, which
  # merge_group does not carry); every other check runs here. INERT until a repo
  # admin enables the merge queue in branch protection.
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the exact channel (+ rustfmt, clippy).
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Format
        run: cargo fmt --all --check

  self_governance:
    name: self-governance (compile · index · lint · couple)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the coupling gate can diff against the merge base.
          fetch-depth: 0
      - name: Build CLI
        run: cargo build --bin spec-spine --locked
      - name: Compile registry (validation gate)
        run: ./target/debug/spec-spine compile
      - name: Codebase index freshness (committed artifacts must be current)
        run: ./target/debug/spec-spine index check
      - name: Conformance lint (fail on warn)
        run: ./target/debug/spec-spine lint --fail-on-warn
      # The coupling gate is a PR-time gate (spec 005 §1): it joins the spec and
      # code views and refuses the *merge* when code drifts from its owning spec.
      # It runs on pull_request only. A push to main has already merged (nothing
      # left to refuse) and carries no PR body, so the Spec-Drift-Waiver line is
      # unrecoverable: it lives in the PR description, not the squash commit
      # message. A legitimately waived PR would otherwise resurface as a false
      # drift failure on the post-merge main push.
      - name: Coupling gate (spec/code drift)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          echo "coupling base: $BASE → HEAD"
          printf '%s' "${PR_BODY:-}" > /tmp/pr-body.txt
          ./target/debug/spec-spine couple --base "$BASE" --head HEAD --pr-body /tmp/pr-body.txt

  # Cross-triple determinism golden, run as a reusable workflow so a single
  # `ci-gate` check below covers it too (spec 020).
  determinism:
    name: determinism
    uses: ./.github/workflows/determinism.yml

  # Spec 020: the single required status check for branch protection and the
  # merge queue. It aggregates every CI job, so branch protection requires just
  # this one name instead of an enumerated, drift-prone list. A skipped job
  # (e.g. a future event-gated one) counts as a pass; a failed or cancelled job
  # fails the gate.
  ci-gate:
    name: ci-gate
    if: ${{ always() }}
    needs: [test, self_governance, determinism]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to have passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job failed or was cancelled:"
          echo "  test=${{ needs.test.result }}  self_governance=${{ needs.self_governance.result }}  determinism=${{ needs.determinism.result }}"
          exit 1
      - name: All required CI jobs passed
        run: |
          echo "ci-gate passed: test, self_governance, and determinism are all green"
